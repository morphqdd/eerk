name: eerk
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  baseline-check:
    runs-on: ubuntu-latest
    env:
      TEMPLATE_REPO: morphqdd/eerk-baseline
      BASELINE_TAG: v1
      DRIFT_LABEL: repo-drift
    steps:
      - name: Mint app token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.EERK_APP_ID }}
          private-key: ${{ secrets.EERK_APP_PRIVATE_KEY }}

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch baseline
        run: |
          gh repo clone "$TEMPLATE_REPO" baseline-src -- --depth 1 --branch "$BASELINE_TAG"
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}

      - name: Install eerk
        run: cargo install --git https://github.com/morphqdd/eerk --tag v0.1.0 eerk

      - name: Collect settings
        run: bash baseline-src/action/collect-state.sh
        env:
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ steps.app.outputs.token }}

      - name: Run check
        id: check
        run: |
          set +e
          eerk check \
            --baseline baseline-src/baseline \
            --manifest baseline-src/baseline.toml \
            --repo . \
            --state state.json \
            --out report.json
          code=$?
          set -e
          if [ "$code" -gt 1 ]; then
            echo "eerk check failed with exit $code" >&2
            exit "$code"
          fi
          echo "drift=$code" >> "$GITHUB_OUTPUT"

      - name: Render report
        run: eerk render --report report.json > body.md

      - name: Upsert tracking issue
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          existing="$(gh issue list --label "$DRIFT_LABEL" --state open \
            --json number --jq '.[0].number')"
          if [ "${{ steps.check.outputs.drift }}" = "1" ]; then
            if [ -n "$existing" ]; then
              gh issue edit "$existing" --body-file body.md
            else
              gh issue create --title "Baseline drift detected" \
                --label "$DRIFT_LABEL" --body-file body.md
            fi
          elif [ -n "$existing" ]; then
            gh issue close "$existing" --comment "Baseline drift resolved. ✅"
          fi
